name: yoyo Research

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:
    inputs:
      focus:
        description: 'What should yoyo research?'
        required: false

concurrency:
  group: yoyo-research
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.bot-token.outputs.token }}

      - name: Configure git
        run: |
          SLUG="${{ steps.bot-token.outputs.app-slug }}"
          git config user.name "${SLUG}[bot]"
          git config user.email "${SLUG}[bot]@users.noreply.github.com"

      - name: Run yoyo Research
        uses: yologdev/yoyo-action@v1
        with:
          agent: research
          args: ${{ github.event.inputs.focus || '' }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gh_token: ${{ steps.bot-token.outputs.token }}
