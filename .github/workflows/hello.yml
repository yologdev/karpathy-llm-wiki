name: Hello World

on:
  workflow_dispatch:

jobs:
  hello:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install yoyo
        run: |
          curl -fsSL https://raw.githubusercontent.com/yologdev/yoyo/main/install.sh | bash
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify yoyo
        run: yoyo --version

      - name: Test API key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Say hello in one sentence." | yoyo --model claude-opus-4-6
