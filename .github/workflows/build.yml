name: yoyo Build

on:
  issues:
    types: [labeled]
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      issue:
        description: 'Issue number to implement'
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    if: >
      github.event_name != 'issues' ||
      github.event.label.name == 'ready'

    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.bot-token.outputs.token }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile 2>/dev/null || pnpm install || true

      - name: Configure git
        run: |
          SLUG="${{ steps.bot-token.outputs.app-slug }}"
          git config user.name "${SLUG}[bot]"
          git config user.email "${SLUG}[bot]@users.noreply.github.com"

      - name: Determine issue number
        id: issue
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ISSUE: ${{ github.event.issue.number }}
          INPUT_ISSUE: ${{ github.event.inputs.issue }}
        run: |
          if [ "$EVENT_NAME" = "issues" ]; then
            echo "number=$EVENT_ISSUE" >> "$GITHUB_OUTPUT"
          elif [ -n "$INPUT_ISSUE" ]; then
            echo "number=$INPUT_ISSUE" >> "$GITHUB_OUTPUT"
          else
            echo "number=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run yoyo Build
        uses: yologdev/yoyo-action@v1
        with:
          agent: build
          args: ${{ steps.issue.outputs.number }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gh_token: ${{ steps.bot-token.outputs.token }}
